    <!DOCTYPE html>
    <html lang="ja">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LC Action Tracker 2627 | AIESEC Japan</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
    :root{
    --bg:#F3F4F7;--bg2:#EAEBF0;--border:#CACCD1;--text:#52565E;--dim:#8A8E96;
    --faint:#CACCD1;--white:#ffffff;--dark:#1B2C5E;--done:#00C16E;--done-bg:#E5F9F0;
    --wip:#F48924;--wip-bg:#FEF3E8;--ns-bg:#F3F4F7;--danger:#F85A40;--primary:#037EF3;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{font-size:14px;}
    body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;min-height:100vh;}
    .app{display:flex;min-height:100vh;}

    /* ── SIDEBAR ── */
    .sidebar{width:210px;min-width:210px;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;background:var(--dark);z-index:100;overflow-y:auto;}
    .logo{padding:16px 14px 14px;border-bottom:1px solid rgba(255,255,255,0.08);}
    .logo-eye{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
    .logo-wordmark{display:flex;flex-direction:column;}
    .logo-title{font-size:22px;font-weight:900;color:#fff;letter-spacing:0.06em;line-height:1;}
    .logo-sub{font-size:9px;font-weight:700;color:rgba(255,255,255,0.32);letter-spacing:0.16em;text-transform:uppercase;margin-top:3px;}
    .nav{flex:1;padding-top:4px;}
    .nav-label{font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.28);padding:10px 14px 4px;}
    .nav-item{display:flex;align-items:center;padding:7px 14px;cursor:pointer;font-size:11px;font-weight:700;gap:8px;color:rgba(255,255,255,0.52);transition:background 0.1s,color 0.1s;border-left:3px solid transparent;}
    .nav-item:hover{background:rgba(255,255,255,0.07);color:#fff;}
    .nav-item.active{background:rgba(255,255,255,0.11);color:#fff;}
    .ndot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
    .nb{margin-left:auto;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);}
    .nav-sub{overflow:hidden;max-height:0;transition:max-height 0.2s ease;}
    .nav-sub.open{max-height:300px;}
    .nav-sub-item{display:flex;align-items:center;padding:5px 14px 5px 30px;cursor:pointer;font-size:10px;font-weight:700;gap:7px;color:rgba(255,255,255,0.4);transition:background 0.1s,color 0.1s;border-left:3px solid transparent;}
    .nav-sub-item:hover{background:rgba(255,255,255,0.06);color:#fff;}
    .nav-sub-item.active{color:#fff;background:rgba(255,255,255,0.1);}
    .nav-sub-divider{height:1px;background:rgba(255,255,255,0.06);margin:3px 14px;}
    .breadcrumb{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--dim);}
    .breadcrumb a{color:var(--dim);cursor:pointer;text-decoration:none;}
    .breadcrumb a:hover{color:var(--text);}
    .breadcrumb-sep{color:var(--faint);}
    .sidebar-foot{border-top:1px solid rgba(255,255,255,0.08);padding:10px;display:flex;flex-direction:column;gap:5px;}
    .sf-btn{font-family:'Lato',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:6px 10px;cursor:pointer;border-radius:5px;text-align:center;display:block;width:100%;}

    /* ── TOPBAR ── */
    .main{margin-left:210px;flex:1;}
    .topbar{position:sticky;top:0;z-index:50;background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(27,44,94,0.06);}
    .topbar-l{display:flex;align-items:center;gap:10px;}
    .page-title{font-size:22px;font-weight:900;letter-spacing:0.04em;color:var(--dark);line-height:1;}
    .page-sub{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);}
    .topbar-r{display:flex;align-items:center;gap:7px;}
    .search-box{display:flex;align-items:center;gap:7px;border:1.5px solid var(--border);background:var(--bg);padding:5px 10px;border-radius:5px;transition:border-color 0.1s;}
    .search-box:focus-within{border-color:var(--text);}
    .search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'Lato',sans-serif;font-size:12px;width:150px;}
    .search-box input::placeholder{color:var(--faint);}
    .btn{font-family:'Lato',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:6px 14px;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text);border-radius:5px;transition:all 0.1s;}
    .btn:hover{border-color:var(--text);background:var(--bg);}
    .btn-fill{background:var(--dark);color:#fff;border-color:var(--dark);}
    .btn-fill:hover{background:#243a7a;border-color:#243a7a;}
    .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
    .btn-primary:hover{background:#0264c5;border-color:#0264c5;}

    /* ── CONTENT ── */
    .content{padding:24px;}

    /* ── DASHBOARD ── */
    .dash-hero{background:var(--dark);border-radius:10px;padding:24px 28px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;overflow:hidden;position:relative;}
    .dash-hero::before{content:'';position:absolute;right:-40px;top:-40px;width:260px;height:260px;background:radial-gradient(circle,rgba(3,126,243,0.25) 0%,transparent 70%);pointer-events:none;}
    .dh-left{}
    .dh-eyewrap{margin-bottom:8px;}
    .dh-title{font-size:44px;font-weight:900;line-height:0.92;color:#fff;letter-spacing:0.02em;}
    .dh-title span{color:#FFC845;}
    .dh-sub{font-size:10px;color:rgba(255,255,255,0.38);margin-top:9px;letter-spacing:0.1em;text-transform:uppercase;}
    .dh-right{text-align:right;position:relative;z-index:1;}
    .dh-pct{font-size:64px;font-weight:900;line-height:1;color:#fff;letter-spacing:-0.03em;}
    .dh-pct-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,0.38);letter-spacing:0.14em;text-transform:uppercase;}
    .dh-total{font-size:10px;color:rgba(255,255,255,0.38);margin-top:4px;}
    .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
    .stat-card{background:var(--white);border:1px solid var(--border);border-radius:7px;padding:14px 16px;}
    .stat-n{font-size:44px;font-weight:900;line-height:1;letter-spacing:-0.03em;}
    .stat-n.g{color:var(--done)}.stat-n.a{color:var(--wip)}.stat-n.d{color:var(--faint)}.stat-n.p{color:var(--primary);}
    .stat-l{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);margin-top:3px;}

    /* ── RANKING TABLE ── */
    .section-label{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;}
    .rank-tbl{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px;}
    .rank-tbl th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.13em;color:var(--dim);text-align:left;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--bg);}
    .rank-tbl td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
    .rank-tbl tr:last-child td{border-bottom:none;}
    .rank-tbl tbody tr{cursor:pointer;transition:background 0.08s;}
    .rank-tbl tbody tr:hover td{background:var(--bg);}
    .rank-num{font-size:18px;font-weight:900;color:var(--faint);}
    .rank-num.top3{color:var(--dark);}
    .lc-id-big{font-size:18px;font-weight:900;color:var(--dark);}
    .lc-fname{font-size:10px;color:var(--dim);}
    .region-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;}
    .prog-wrap{display:flex;align-items:center;gap:8px;}
    .prog-track{height:4px;background:var(--bg2);border-radius:2px;width:90px;position:relative;}
    .prog-fill{height:100%;border-radius:2px;position:absolute;left:0;top:0;}
    .prog-pct{font-size:18px;font-weight:900;min-width:42px;}
    .bdn{font-size:10px;color:var(--dim);}
    .gn{color:var(--done)}.an2{color:var(--wip);}

    /* ── LC VIEW ── */
    .fbar{display:flex;align-items:center;gap:5px;margin-bottom:18px;flex-wrap:wrap;}
    .fl{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-right:4px;}
    .fb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;padding:5px 11px;border:1.5px solid var(--border);cursor:pointer;background:var(--white);color:var(--dim);transition:all 0.08s;border-radius:4px;}
    .fb:hover{border-color:var(--text);color:var(--text);}
    .fb.active{background:var(--dark);color:#fff;border-color:var(--dark);}
    .fr-right{margin-left:auto;font-size:20px;font-weight:900;}

    /* ── KPI BLOCK ── */
    .kpi-block{background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;}
    .kpi-head{display:flex;align-items:stretch;cursor:pointer;transition:background 0.08s;}
    .kpi-head:hover{background:var(--bg);}
    .kpi-idx{font-size:36px;font-weight:900;width:56px;text-align:center;border-right:1px solid var(--border);padding:10px 0;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg);letter-spacing:-0.03em;}
    .kpi-info{flex:1;padding:10px 14px;}
    .kpi-lbl{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--faint);margin-bottom:2px;}
    .kpi-ttl{font-size:13px;font-weight:700;line-height:1.4;color:var(--dark);}
    .kpi-target{font-size:10px;color:var(--dim);margin-top:2px;}
    .kpi-r{padding:10px 14px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:4px;flex-shrink:0;}
    .kpi-pct{font-size:26px;font-weight:900;line-height:1;letter-spacing:-0.03em;}
    .kpi-bar{width:76px;height:4px;background:var(--bg2);border-radius:2px;}
    .kpi-bar-f{height:100%;border-radius:2px;}
    .kpi-cnt{font-size:10px;color:var(--dim);}
    .kpi-chev{width:36px;border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:17px;transition:transform 0.14s;flex-shrink:0;}
    .kpi-chev.open{transform:rotate(90deg);}

    /* ── TASK TABLE ── */
    .kpi-body{display:none;border-top:1px solid var(--border);}
    .kpi-body.open{display:block;}
    .tt{width:100%;border-collapse:collapse;}
    .tt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--dim);text-align:left;padding:7px 14px;border-bottom:1px solid var(--border);background:var(--bg);}
    .tt td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
    .tr:last-child td{border-bottom:none;}
    .tr:hover td{background:var(--bg);}
    .tn{font-size:13px;font-weight:700;color:var(--dark);}
    .tres{font-size:11px;color:var(--dim);}
    .tdt{font-size:11px;color:var(--dim);white-space:nowrap;}
    .tdt.ov{color:var(--danger);font-weight:700;}
    .ta{display:flex;gap:4px;opacity:0;transition:opacity 0.08s;}
    .tr:hover .ta{opacity:1;}
    .ib{font-size:11px;padding:3px 7px;border:1px solid var(--border);cursor:pointer;color:var(--dim);transition:all 0.08s;background:transparent;border-radius:4px;}
    .ib:hover{border-color:var(--text);color:var(--text);}
    .ib.del:hover{border-color:var(--danger);color:var(--danger);}
    .add-r td{padding:8px 14px;border-bottom:none;}
    .add-btn{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:color 0.08s;background:none;border:none;}
    .add-btn:hover{color:var(--text);}
    .group-cell{font-size:11px;font-weight:700;color:var(--dark);background:var(--bg);border-right:1px solid var(--border);padding:9px 10px;vertical-align:middle;max-width:110px;}
    .group-cell-label{text-align:center;background:var(--bg2);border-radius:4px;padding:3px 7px;font-size:10px;font-weight:700;color:var(--text);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:95px;}
    .group-cell.empty{background:transparent;}
    .tnote{font-size:11px;color:var(--dim);line-height:1.4;max-width:160px;word-break:break-all;}
    .tnote-empty{color:var(--faint);font-size:10px;cursor:pointer;}
    .tnote-empty:hover{color:var(--text);}
    textarea.fi{resize:vertical;min-height:55px;font-size:12px;line-height:1.5;}

    /* ── CHIPS ── */
    .chip{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;padding:3px 8px;display:inline-flex;align-items:center;gap:4px;border-radius:4px;cursor:pointer;user-select:none;transition:opacity 0.1s;white-space:nowrap;border:none;}
    .chip:hover{opacity:0.78;}
    .chip.done{color:var(--done);background:var(--done-bg);}
    .chip.wip{color:var(--wip);background:var(--wip-bg);}
    .chip.ns{color:var(--dim);background:var(--ns-bg);}

    /* ── AREA PAGE HERO ── */
    .area-hero{border-radius:10px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;}
    .area-hero::before{content:'';position:absolute;right:-30px;top:-30px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,255,255,0.12) 0%,transparent 70%);pointer-events:none;}
    .ah-title{font-size:52px;font-weight:900;line-height:1;color:#fff;letter-spacing:-0.02em;}
    .ah-lc{font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:0.12em;text-transform:uppercase;margin-top:6px;}
    .ah-right{text-align:right;}
    .ah-pct{font-size:56px;font-weight:900;line-height:1;color:#fff;letter-spacing:-0.04em;}
    .ah-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,0.45);letter-spacing:0.14em;text-transform:uppercase;}
    .ah-total{font-size:10px;color:rgba(255,255,255,0.4);margin-top:4px;}
    .area-section{margin-bottom:4px;}
    .area-section-hd{display:flex;align-items:center;gap:10px;padding:10px 16px 10px;background:var(--white);border:1px solid var(--border);border-radius:8px 8px 0 0;border-bottom:2px solid;margin-bottom:0;}
    .area-section-hd-title{font-size:20px;font-weight:900;letter-spacing:0.04em;}
    .area-section-stats{font-size:10px;color:var(--dim);margin-left:6px;}
    .area-section-pct{font-size:20px;font-weight:900;margin-left:auto;}
    .area-section-body{border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;overflow:hidden;margin-bottom:16px;}

    /* ── GOAL GROUPS ── */
    .goal-group{margin-bottom:6px}
    .goal-group-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg);border-radius:8px;cursor:pointer;border:1.5px solid var(--border);margin-bottom:4px;transition:background .15s}
    .goal-group-hd:hover{background:var(--bg2)}
    .goal-type-chip{display:inline-block;font-size:9px;font-weight:900;letter-spacing:.06em;padding:2px 6px;border-radius:3px;flex-shrink:0}
    .goal-name{font-size:13px;font-weight:800;color:var(--dark);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .goal-stats{font-size:10px;color:var(--dim);flex-shrink:0;white-space:nowrap}
    .goal-bar-mini{width:60px;height:4px;background:var(--border);border-radius:2px;flex-shrink:0;overflow:hidden}
    .goal-group-body{display:none;padding-left:12px;border-left:2px solid var(--border);margin-bottom:4px}
    .goal-group-body.open{display:block}

    /* ── GANTT ── */
    .gantt-wrap{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .gantt-toolbar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap;}
    .gantt-legend{display:flex;align-items:center;gap:12px;font-size:11px;font-weight:700;margin-right:auto;}
    .gl-item{display:flex;align-items:center;gap:4px;}
    .gl-dot{width:9px;height:9px;border-radius:2px;}
    .gantt-filter{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
    .gfb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;padding:4px 9px;border:1.5px solid var(--border);cursor:pointer;background:var(--white);color:var(--dim);transition:all 0.08s;border-radius:4px;}
    .gfb:hover{border-color:var(--text);color:var(--text);}
    .gfb.active{background:var(--dark);color:#fff;border-color:var(--dark);}
    .gantt-scroll{overflow-x:auto;}
    .gantt-inner{min-width:800px;}
    .gantt-head{display:flex;position:sticky;top:54px;z-index:20;background:var(--bg);border-bottom:2px solid var(--border);}
    .g-name-hd{width:240px;min-width:240px;padding:9px 14px;font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);border-right:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;}
    .g-res-hd{width:80px;min-width:80px;padding:9px 7px;font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);border-right:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;}
    .g-timeline-hd{flex:1;display:flex;flex-direction:column;}
    .g-month-row{display:flex;border-bottom:1px solid var(--border);}
    .g-month-hd{text-align:center;font-size:9px;font-weight:700;letter-spacing:0.1em;padding:7px 4px;color:var(--dim);border-right:1px solid var(--border);}
    .g-day-row{position:relative;height:20px;overflow:hidden;background:var(--bg);}
    .g-day-tick{position:absolute;transform:translateX(-50%);top:2px;display:flex;flex-direction:column;align-items:center;gap:1px;pointer-events:none;}
    .g-day-tick-line{width:1px;height:5px;background:var(--border);}
    .g-day-label{font-size:8px;color:var(--dim);white-space:nowrap;line-height:1;}
    .g-area-row{display:flex;align-items:center;border-bottom:2px solid var(--border);border-top:2px solid var(--border);margin-top:3px;}
    .g-area-hd{width:240px;min-width:240px;padding:9px 14px;display:flex;align-items:center;gap:9px;border-right:1px solid var(--border);flex-shrink:0;}
    .g-area-label{font-size:18px;font-weight:900;letter-spacing:0.04em;}
    .g-area-count{font-size:10px;font-weight:700;}
    .g-area-res{width:80px;min-width:80px;border-right:1px solid var(--border);flex-shrink:0;}
    .g-area-chart{flex:1;position:relative;height:34px;}
    .g-row{display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:36px;transition:background 0.07s;}
    .g-row:hover{background:var(--bg);}
    .g-row:last-child{border-bottom:none;}
    .g-row.g-child{min-height:28px;background:rgba(0,0,0,0.01);}
    .g-name{width:240px;min-width:240px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--dark);border-right:1px solid var(--border);display:flex;align-items:center;gap:5px;overflow:hidden;flex-shrink:0;}
    .g-name.g-child-name{font-size:11px;font-weight:400;padding-left:28px;}
    .g-name-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .g-res{width:80px;min-width:80px;padding:6px 7px;font-size:10px;color:var(--dim);border-right:1px solid var(--border);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex-shrink:0;}
    .g-chart{flex:1;position:relative;height:36px;}
    .g-row.g-child .g-chart{height:28px;}
    .g-grid{position:absolute;inset:0;display:flex;pointer-events:none;}
    .g-grid-col{flex:1;border-right:1px solid var(--bg2);}
    .g-bar{position:absolute;height:16px;border-radius:3px;min-width:3px;transition:opacity 0.1s;}
    .g-bar:hover{opacity:0.8;}
    .g-row.g-child .g-chart .g-bar{height:11px;border-radius:2px;top:50%;transform:translateY(-50%);}
    .g-today{position:absolute;top:0;bottom:0;width:2px;z-index:5;pointer-events:none;background:#F85A40;opacity:0.7;}

    /* ── AREA MGMT ── */
    .area-list-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
    .area-list-row:last-child{border-bottom:none;}
    .area-color-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0;}
    .area-list-name{flex:1;font-size:13px;font-weight:700;color:var(--dark);}
    .area-list-stats{font-size:10px;color:var(--dim);}

    /* ── MODAL ── */
    .overlay{position:fixed;inset:0;background:rgba(27,44,94,0.48);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
    .overlay.open{display:flex;}
    .modal{background:var(--white);border:1px solid var(--border);border-radius:10px;width:460px;max-width:calc(100vw - 32px);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(27,44,94,0.2);animation:popIn 0.15s ease;}
    .modal-wide{width:520px;}
    @keyframes popIn{from{opacity:0;transform:scale(0.96) translateY(8px)}to{opacity:1;transform:none}}
    .mh{background:var(--dark);color:#fff;padding:14px 18px;border-radius:10px 10px 0 0;font-size:13px;font-weight:900;letter-spacing:0.04em;text-transform:uppercase;}
    .mb{padding:18px;}
    .fg{margin-bottom:12px;}
    .fl2{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--dim);margin-bottom:4px;}
    .fi,.fs{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--dark);font-size:13px;font-family:'Lato',sans-serif;padding:7px 10px;outline:none;transition:border-color 0.1s;border-radius:5px;}
    .fi:focus,.fs:focus{border-color:var(--text);background:var(--white);}
    .fs{cursor:pointer;}
    option{background:var(--white);}
    .fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .mf{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end;background:var(--bg);border-radius:0 0 10px 10px;}
    .sub-banner{background:var(--wip-bg);border:1px solid #F4832444;border-radius:5px;padding:7px 10px;margin-bottom:12px;font-size:11px;color:var(--wip);font-weight:700;}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:22px;right:22px;background:var(--dark);color:#fff;padding:9px 14px;font-size:12px;font-weight:700;z-index:2000;animation:slideUp 0.18s ease;border-radius:5px;box-shadow:0 4px 14px rgba(27,44,94,0.2);}
    @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .toast.err{background:var(--danger);}

    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

    /* ── HAMBURGER BUTTON ── */
    .ham{display:none;align-items:center;justify-content:center;width:36px;height:36px;border:1.5px solid var(--border);border-radius:5px;background:var(--white);cursor:pointer;flex-shrink:0;}
    .ham span{display:block;width:16px;height:1.5px;background:var(--text);border-radius:1px;transition:all 0.2s;}
    .ham span+span{margin-top:4px;}

    /* ── SIDEBAR OVERLAY ── */
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:99;backdrop-filter:blur(1px);}
    .sidebar-overlay.open{display:block;}

    /* ══════════════════════════════════════
    RESPONSIVE
    ══════════════════════════════════════ */

    /* ── TABLET (≤ 1024px) ── */
    @media(max-width:1024px){
    .rank-tbl .bdn{display:none;}
    .g-name{width:160px;min-width:160px;}
    .g-res-hd,.g-res,.g-area-res{display:none;}
    .g-name-hd{width:160px;min-width:160px;}
    .g-area-hd{width:160px;min-width:160px;}
    .gantt-inner{min-width:600px;}
    }

    /* ── MOBILE (≤ 768px) ── */
    @media(max-width:768px){
    html{font-size:13px;}

    /* Sidebar: slide-in drawer */
    .sidebar{
        transform:translateX(-100%);
        transition:transform 0.25s ease;
        z-index:200;
        width:240px;
        min-width:240px;
    }
    .sidebar.open{transform:translateX(0);}
    .sidebar-overlay{display:none;}
    .sidebar-overlay.open{display:block;}

    /* Main area: full width */
    .main{margin-left:0;}

    /* Topbar */
    .topbar{padding:0 14px;height:52px;gap:8px;}
    .ham{display:flex;}
    .page-title{font-size:17px;}
    .page-sub{display:none;}
    .search-box{display:none;}
    .topbar-r{gap:5px;}
    #addbtn,#addkpibtn{font-size:10px;padding:5px 10px;}

    /* Content padding */
    .content{padding:14px;}

    /* Dashboard hero */
    .dash-hero{flex-direction:column;align-items:flex-start;gap:10px;padding:16px 18px;}
    .dh-right{text-align:left;}
    .dh-title{font-size:32px;}
    .dh-pct{font-size:44px;}

    /* Stat row */
    .stat-row{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
    .stat-n{font-size:32px;}

    /* Ranking table: hide less important columns */
    .rank-tbl .rank-tbl-region,
    .rank-tbl th:nth-child(6),
    .rank-tbl td:nth-child(6){display:none;}
    .lc-id-big{font-size:15px;}
    .prog-track{width:60px;}
    .prog-pct{font-size:14px;}

    /* Filter bar */
    .fbar{gap:4px;}
    .fb{padding:4px 8px;font-size:9px;}
    .fr-right{font-size:16px;}

    /* Area section header */
    .area-section-hd{padding:8px 12px;}
    .area-section-hd-title{font-size:16px;}
    .area-section-pct{font-size:16px;}

    /* KPI block */
    .kpi-idx{width:42px;font-size:26px;}
    .kpi-ttl{font-size:12px;}
    .kpi-pct{font-size:20px;}
    .kpi-bar{width:56px;}
    .kpi-r{padding:8px 10px;}

    /* Task table → horizontal scroll */
    .kpi-body{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .tt{min-width:520px;}
    .tnote{max-width:110px;}
    .group-cell{max-width:80px;}
    .group-cell-label{max-width:72px;}

    /* Area hero */
    .area-hero{flex-direction:column;align-items:flex-start;gap:8px;padding:16px 18px;}
    .ah-title{font-size:38px;}
    .ah-pct{font-size:40px;}
    .ah-right{text-align:left;}

    /* Gantt toolbar */
    .gantt-toolbar{gap:6px;padding:8px 10px;}
    .gantt-legend{flex-wrap:wrap;gap:8px;font-size:10px;}
    .g-name-hd,.g-name{width:120px;min-width:120px;}
    .g-area-hd{width:120px;min-width:120px;}
    .g-res-hd,.g-res,.g-area-res{display:none;}
    .gantt-inner{min-width:460px;}

    /* Modals: full-screen on small phones */
    .modal,.modal-wide{
        width:100%;
        max-width:100%;
        max-height:100dvh;
        border-radius:16px 16px 0 0;
        margin-top:auto;
    }
    .overlay{align-items:flex-end;}

    /* Toast: bottom center */
    .toast{bottom:14px;right:14px;left:14px;text-align:center;}

    /* Breadcrumb */
    .breadcrumb{font-size:9px;}

    /* Nav sub items - slightly larger hit target */
    .nav-sub-item{padding:7px 14px 7px 28px;}
    }

    /* ── SMALL MOBILE (≤ 400px) ── */
    @media(max-width:400px){
    .stat-row{grid-template-columns:1fr 1fr;}
    .stat-n{font-size:28px;}
    .dash-hero{padding:14px;}
    .dh-title{font-size:26px;}
    #addbtn{display:none!important;}
    .fr2{grid-template-columns:1fr;}
    }

    </style>

    function ensureAreas(){
    if(!D.areaTypes)D.areaTypes=JSON.parse(JSON.stringify(DEFAULT_AREA_TYPES));
    if(!D.lcs)D.lcs=makeSeed().lcs;
    // Add any LCs in LC_META that are missing from stored data (e.g. FK added later)
    LC_META.forEach(meta=>{
        if(!D.lcs.find(x=>x.id===meta.id))
        D.lcs.push({id:meta.id,name:meta.name,region:meta.region,areas:{},extraAreas:[]});
    });
    // Remove any LCs that are no longer in LC_META (e.g. SD removed)
    D.lcs=D.lcs.filter(lc=>LC_META.find(m=>m.id===lc.id));
    D.lcs.forEach(lc=>{
        if(!lc.areas)lc.areas={};
        if(!lc.extraAreas)lc.extraAreas=[];
        // Migrate old per-LC areaTypes → move non-global ones to extraAreas
        if(lc.areaTypes){
        lc.areaTypes.forEach(at=>{
            if(!D.areaTypes.find(x=>x.id===at.id)&&!lc.extraAreas.find(x=>x.id===at.id))
            lc.extraAreas.push(at);
        });
        delete lc.areaTypes;
        }
        getLCAreaTypes(lc.id).forEach(at=>{
        if(!lc.areas[at.id])lc.areas[at.id]={kpis:[]};
        });
    });
    }
    function getLCAreaTypes(lId){
    const lc=D.lcs.find(x=>x.id===lId);if(!lc)return[];
    const extras=(lc.extraAreas||[]).filter(e=>!D.areaTypes.find(g=>g.id===e.id));
    return[...D.areaTypes,...extras];
    }
    function getAreaColor(lId,aId){const at=getLCAreaTypes(lId).find(x=>x.id===aId);return at?at.color:'#52565E';}
    function getAreaColor(lId,aId){const at=getLCAreaTypes(lId).find(x=>x.id===aId);return at?at.color:'#52565E';}
    function save(){try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){}}
    function gid(){return 'x'+Date.now()+'_'+Math.random().toString(36).slice(2,5);}
    function h(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function fd(s){if(!s)return'—';const d=new Date(s);if(isNaN(d))return s;return(d.getMonth()+1)+'/'+(d.getDate());}
    function isOver(dl){if(!dl)return false;const d=new Date(dl);return !isNaN(d)&&d<new Date();}
    function sl(s){return s==='DONE'?'Done':s==='WIP'?'WIP':'Not Started';}
    function sc(s){return s==='DONE'?'done':s==='WIP'?'wip':'ns';}
    function si(s){return s==='DONE'?'✓':s==='WIP'?'◑':'';}
    function getLCArea(lId,aId){
    const lc=D.lcs.find(x=>x.id===lId);if(!lc)return null;
    if(!lc.areas[aId])lc.areas[aId]={kpis:[]};
    return lc.areas[aId];
    }

    /* ── STATS ── */
    function taskStats(t){
    let d=0,w=0,n=0,tot=0;
    function count(x){
        tot++;
        if(x.status==='DONE')d++;else if(x.status==='WIP')w++;else n++;
        (x.children||[]).forEach(c=>count(c));
    }
    count(t);return{done:d,wip:w,ns:n,total:tot};
    }
    function kpiStats(k){
    let d=0,w=0,n=0,t=0;
    k.tasks.forEach(task=>{const s=taskStats(task);d+=s.done;w+=s.wip;n+=s.ns;t+=s.total;});
    return{done:d,wip:w,ns:n,total:t};
    }
    function lcAreaStats(lId,aId){
    const area=getLCArea(lId,aId);if(!area)return{done:0,wip:0,ns:0,total:0,pct:0};
    let d=0,w=0,n=0,t=0;
    area.kpis.forEach(k=>{const s=kpiStats(k);d+=s.done;w+=s.wip;n+=s.ns;t+=s.total;});
    return{done:d,wip:w,ns:n,total:t,pct:t?Math.round(d/t*100):0};
    }
    function lcStats(lId){
    let d=0,w=0,n=0,t=0;
    getLCAreaTypes(lId).forEach(at=>{const s=lcAreaStats(lId,at.id);d+=s.done;w+=s.wip;n+=s.ns;t+=s.total;});
    return{done:d,wip:w,ns:n,total:t,pct:t?Math.round(d/t*100):0};
    }
    function totals(){
    let d=0,w=0,n=0,t=0;
    D.lcs.forEach(lc=>{const s=lcStats(lc.id);d+=s.done;w+=s.wip;n+=s.ns;t+=s.total;});
    return{done:d,wip:w,ns:n,total:t,pct:t?Math.round(d/t*100):0};
    }

    function buildNav(){
    const inLC = (view==='lc'||view==='area') && lcId;
    ['East','Central','West'].forEach(region=>{
        const suffix=region.toLowerCase();
        document.getElementById('nav-'+suffix).innerHTML=
        D.lcs.filter(lc=>lc.region===region).map(lc=>{
            const s=lcStats(lc.id);const rc=REGION_COLORS[region];
            const lcActive=(view==='lc'||view==='area')&&lcId===lc.id;
            const subOpen=lcActive;

            // Area sub-items (shown when this LC is active)
            const subItems=subOpen?`<div class="nav-sub open" id="subnav-${lc.id}">
            <div class="nav-sub-divider"></div>
            ${getLCAreaTypes(lc.id).map(at=>{
                const as=lcAreaStats(lc.id,at.id);if(as.total===0)return'';
                const aActive=view==='area'&&areaId===at.id&&lcId===lc.id;
                return `<div class="nav-sub-item${aActive?' active':''}" onclick="swArea('${lc.id}','${at.id}')"
                style="border-left-color:${aActive?at.color:'transparent'}">
                <div style="width:6px;height:6px;border-radius:1px;flex-shrink:0;background:${at.color}"></div>
                <span style="flex:1">${at.id}</span>
                <span style="font-size:9px;font-weight:700;color:rgba(255,255,255,0.3)">${as.pct}%</span>
                </div>`;
            }).join('')}
            </div>`:'';

            return `<div>
            <div class="nav-item${lcActive?' active':''}" data-lc="${lc.id}" onclick="swLC('${lc.id}',this)"
                style="border-left-color:${lcActive?rc:'transparent'}">
                <div class="ndot" style="background:${rc}"></div>
                <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${lc.id}</span>
                <span class="nb">${s.pct}%</span>
            </div>
            ${subItems}
            </div>`;
        }).join('');
    });
    // Update top nav active states
    document.querySelectorAll('.nav-item[data-view]').forEach(n=>{
        n.classList.toggle('active',n.dataset.view===view);
    });
    }

    // Status filter
    const statusBar=`<div style="margin-bottom:16px;display:flex;align-items:center;gap:5px;flex-wrap:wrap">
        <span class="fl">ステータス</span>
        <button class="fb ${fil==='ALL'?'active':''}" onclick="setF('ALL')">All</button>
        <button class="fb ${fil==='DONE'?'active':''}" onclick="setF('DONE')">Done</button>

    document.getElementById('ct').innerHTML=fbar+statusBar+areaBlocks+`

    function deleteGoal(lId,aId,gId){
    const area=getLCArea(lId,aId);if(!area)return;
    const g=area.goals?.find(x=>x.id===gId);if(!g)return;
    const kpiCount=area.kpis.filter(k=>k.goalId===gId).length;
    const msg=kpiCount?`「${g.name}」を削除すると ${kpiCount}件のKPIの紐づけが解除されます。続けますか？`:`「${g.name}」を削除しますか？`;
    if(!confirm(msg))return;
    area.goals=area.goals.filter(x=>x.id!==gId);
    area.kpis.forEach(k=>{if(k.goalId===gId)k.goalId=null;});
    save();buildNav();
    if(view==='area'&&lcId&&areaId)rArea(lcId,areaId);
    else if(view==='lc'&&lcId)rLC(lcId);
    toast(`「${g.name}」を削除しました`);

    // Group KPIs by goal

    /* ── TASK STATUS CYCLE ── */
    function cycTask(lId,aId,kId,tId,e){
    if(e)e.stopPropagation();
    const area=getLCArea(lId,aId);if(!area)return;
    const k=area.kpis.find(x=>x.id===kId);if(!k)return;
    let t=k.tasks.find(x=>x.id===tId);
    if(!t){for(const p of k.tasks){const c=(p.children||[]).find(x=>x.id===tId);if(c){t=c;break;}}}
    if(!t)return;
    const ord=['NOT_STARTED','WIP','DONE'];
    t.status=ord[(ord.indexOf(t.status)+1)%3];
    save();buildNav();
    const row=document.getElementById('row-'+tId);
    if(row){const chip=row.querySelector('.chip');chip.className=`chip ${sc(t.status)}`;chip.textContent=(si(t.status)?si(t.status)+' ':'')+sl(t.status);}
    toast(sl(t.status)+'に変更');
    if(view==='dashboard')rDash();
    }

    /* ── GANTT ── */
    const G_START=new Date(2026,1,1);
    const G_END=new Date(2026,8,30);
    const G_MS=G_END-G_START;
    const MONTH_DATA=[
    {name:'2月',days:28,mi:2},{name:'3月',days:31,mi:3},{name:'4月',days:30,mi:4},
    {name:'5月',days:31,mi:5},{name:'6月',days:30,mi:6},{name:'7月',days:31,mi:7},
    {name:'8月',days:31,mi:8},{name:'9月',days:30,mi:9},
    ];
    function gPct(dateStr){if(!dateStr)return null;const d=new Date(dateStr);if(isNaN(d))return null;return Math.max(0,Math.min(100,(d-G_START)/G_MS*100));}

    function buildDayTicks(){
    let html='';
    const tickDays=[1,5,10,15,20,25];
    MONTH_DATA.forEach(m=>{
        tickDays.forEach(d=>{
        if(d>m.days)return;
        const dateStr=`2026-${String(m.mi).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const pct=gPct(dateStr);if(pct===null)return;
        html+=`<div class="g-day-tick" style="left:${pct}%"><div class="g-day-tick-line"></div><div class="g-day-label">${d}</div></div>`;
        });
    });
    return html;
    }

    function rGantt(){
    const todayPct=Math.max(0,Math.min(100,(new Date()-G_START)/G_MS*100));
    // LC filter for gantt
    const filtLC=gfil==='ALL'?null:gfil;
    const lcsToShow=filtLC?D.lcs.filter(x=>x.id===filtLC):D.lcs;

    const lcBtns=`<div class="gantt-filter" style="flex-wrap:wrap;max-width:600px">
        <button class="gfb ${gfil==='ALL'?'active':''}" onclick="setGF('ALL')">全LC</button>
        ${D.lcs.map(lc=>`<button class="gfb ${gfil===lc.id?'active':''}" onclick="setGF('${lc.id}')">${lc.id}</button>`).join('')}
    </div>`;

    const gridLines=MONTH_DATA.map(m=>`<div class="g-grid-col" style="flex:${m.days}"></div>`).join('');

    function renderGBar(t,c,isChild){
        const r=gPct(t.deadline);if(r===null)return null;
        const todP=Math.max(0,Math.min(100,(new Date()-G_START)/G_MS*100));
        const isDone=t.status==='DONE';
        if(isDone){
        const l=gPct(t.start||t.deadline);const left=l!==null?l:r;
        const width=Math.max(0.4,r-left);const h2=isChild?8:12;
        return `<div class="g-bar done" style="left:${left}%;width:${width}%;background:#00C16E;opacity:0.7;top:50%;transform:translateY(-50%);height:${h2}px" title="${h(t.name)} 完了"></div>`;
        }
        const isOverdue=r<todP;const h2=isChild?8:14;
        if(isOverdue){
        return `<div class="g-bar ns" style="left:${r-0.5}%;width:3px;background:#F85A40;opacity:0.9;top:50%;transform:translateY(-50%);height:${h2+2}px;border-radius:2px" title="${h(t.name)} 期限切れ"></div>`;
        }
        const width=Math.max(0.4,r-todP);
        const barColor=t.status==='WIP'?c:'#CACCD1';const barOpacity=t.status==='NOT_STARTED'?'0.5':'1';
        return `<div class="g-bar ${sc(t.status)}" style="left:${todP}%;width:${width}%;background:${barColor};opacity:${barOpacity};top:50%;transform:translateY(-50%);height:${h2}px" title="${h(t.name)} 〜${fd(t.deadline)}"></div>`;
    }

    let rowsHtml='';
    lcsToShow.forEach(lc=>{
        const rc=REGION_COLORS[lc.region]||'#037EF3';
        const ls=lcStats(lc.id);
        rowsHtml+=`
        <div class="g-area-row" style="background:${rc}">
            <div class="g-area-hd" style="background:${rc}">
            <span class="g-area-label" style="color:#fff">${lc.id}</span>
            <span class="g-area-count" style="color:rgba(255,255,255,0.7)">${ls.done}/${ls.total}</span>
            <span style="margin-left:auto;font-size:16px;font-weight:900;color:rgba(255,255,255,0.9)">${ls.pct}%</span>
            </div>
            <div class="g-area-res" style="background:${rc}66"></div>
            <div class="g-area-chart" style="background:${rc}18"><div class="g-grid">${gridLines}</div><div class="g-today" style="left:${todayPct}%"></div></div>
        </div>`;
        getLCAreaTypes(lc.id).forEach(at=>{
        const area=getLCArea(lc.id,at.id);const c=at.color;
        area.kpis.forEach(k=>{
            k.tasks.forEach(t=>{
            const barHtml=renderGBar(t,c,false);if(barHtml===null)return;
            const over=isOver(t.deadline)&&t.status!=='DONE';
            rowsHtml+=`
                <div class="g-row">
                <div class="g-name" style="cursor:pointer" onclick="swLC('${lc.id}',null)" title="${lc.id} · ${at.id}">
                    <span class="chip ${sc(t.status)}" style="font-size:9px;padding:2px 6px;flex-shrink:0" onclick="event.stopPropagation();cycTask('${lc.id}','${at.id}','${k.id}','${t.id}',event)">${si(t.status)||'·'}</span>
                    <span style="font-size:9px;font-weight:900;color:${c};flex-shrink:0">${at.id}</span>
                    <span class="g-name-txt" title="${h(t.name)}">${h(t.name)}</span>
                    ${over?'<span style="color:var(--danger);font-size:10px;flex-shrink:0">！</span>':''}
                </div>
                <div class="g-res">${h(t.res||'—')}</div>
                <div class="g-chart">
                    <div class="g-grid">${gridLines}</div>
                    <div class="g-today" style="left:${todayPct}%"></div>
                    ${barHtml}
                </div>
                </div>`;
            });
        });
        });
    });

    document.getElementById('ct').innerHTML=`
        <div class="gantt-wrap">
        <div class="gantt-toolbar">
            <div class="gantt-legend">
            <div class="gl-item"><div class="gl-dot" style="background:#00C16E"></div><span style="color:var(--done)">Done</span></div>
            <div class="gl-item"><div class="gl-dot" style="background:#F48924"></div><span style="color:var(--wip)">WIP</span></div>
            <div class="gl-item"><div class="gl-dot" style="background:#CACCD1"></div><span style="color:var(--dim)">Not Started</span></div>
            <div class="gl-item"><div class="gl-dot" style="background:#F85A40;width:3px;height:16px;border-radius:1px"></div><span style="color:var(--danger)">今日</span></div>
            </div>
            ${lcBtns}
        </div>
        <div class="gantt-scroll">
            <div class="gantt-inner">
            <div class="gantt-head">
                <div class="g-name-hd">タスク名（LC · エリア）</div>
                <div class="g-res-hd">担当者</div>
                <div class="g-timeline-hd">
                <div class="g-month-row">${MONTH_DATA.map(m=>`<div class="g-month-hd" style="flex:${m.days}">${m.name}</div>`).join('')}</div>
                <div class="g-day-row">${buildDayTicks()}<div class="g-today" style="left:${todayPct}%;height:100%;opacity:0.5"></div></div>
                </div>
            </div>
            ${rowsHtml}
            </div>
        </div>
        </div>`;
    }

    function saveT(){
    const name=document.getElementById('fn').value.trim();
    if(!name){toast('タスク名を入力してください','err');return;}
    const obj={
        name,
        group:(document.getElementById('fg-input')?.value||'').trim(),

        start:document.getElementById('fs2').value,

    function _doDeleteAreaType(aId){
    const taskCount=D.lcs.reduce((s,lc)=>{const a=lc.areas[aId];return s+(a?a.kpis.reduce((ss,k)=>ss+k.tasks.length,0):0);},0);
    const msg=taskCount>0?`「${aId}」を削除すると ${taskCount}件のタスクが全LCから削除されます。続けますか？`:`「${aId}」を削除しますか？`;
    if(!confirm(msg))return;
    D.areaTypes=D.areaTypes.filter(x=>x.id!==aId);
    D.lcs.forEach(lc=>{
        delete lc.areas[aId];
        if(lc.extraAreas)lc.extraAreas=lc.extraAreas.filter(x=>x.id!==aId);
